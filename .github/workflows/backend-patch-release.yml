name: Backend Patch Release

# 手动触发的 Bundle 版 Android 后端热更补丁发布（换 gomobile 的 libgojni.so）。
# 同时产出「后端补丁」(libgojni-<abi>.so + backend-manifest-<abi>.json) 与配套的
# 「前端补丁」(patch-<abi>.zip + manifest-<abi>.json，flutter_patcher)，一并上传到
# **父仓库对应 tag 的 Release**，使客户端能「两个 so 一起下载、只重启一次」。
#
# 用法：从要修复的基线（dev 分支 / 正式版 tag 对应 commit）cherry-pick「纯 Dart /
# 纯 Go 内部逻辑」修复后 dispatch。**mobile.go 导出面必须不变**（见导出面守卫步骤），
# 否则需连 classes.jar/DEX 一起换 → 走整包发版。仅 Android；iOS/桌面不涉及。
# 详见 songloft-player/docs/cn/backend_hotupdate.md。

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: '基线：dev 填 dev（挂 dev 滚动 release）；stable 填安装包版本号如 2.11.0（挂 v2.11.0）'
        required: true
        default: dev
      patch_version:
        description: 'stable 专用：补丁 .so 上报的语义版本（须 > 基线，如 2.11.1，供版本号比较）；dev 忽略'
        required: false
        default: ''
      patch_label:
        description: '补丁展示名 / 忽略键（如 2.11.1-b1）'
        required: true

env:
  GO_VERSION: '1.26'
  FLUTTER_VERSION: '3.44.6'

permissions:
  contents: write

concurrency:
  group: backend-patch-${{ inputs.target_version }}
  cancel-in-progress: false

jobs:
  patch:
    name: Build & publish backend patch (${{ inputs.target_version }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Init submodules
        run: |
          git submodule update --init --recursive -- songloft-player
          git submodule update --init --recursive -- pkg/tag

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Resolve meta (tag / so version / channel / versionCode)
        id: meta
        run: |
          TV='${{ inputs.target_version }}'
          if [ "$TV" = "dev" ]; then
            TAG="dev"
            CHANNEL_VERSION="dev"     # 客户端 FRONTEND_VERSION 渠道
            SO_VERSION="dev"          # version.go Version（dev 比 git_commit，值不关键）
          else
            TAG="v${TV}"
            CHANNEL_VERSION="${TV}"
            PV='${{ inputs.patch_version }}'
            # stable：.so 版本须 > 基线，供客户端版本号比较；未填则退化为基线（不会被检测到，仅告警）
            SO_VERSION="${PV:-$TV}"
            if [ "$SO_VERSION" = "$TV" ]; then
              echo "::warning::stable 补丁的 patch_version 未高于基线（$TV），客户端将无法按版本号检测到更新"
            fi
          fi
          VERSION_CODE=$(grep '^version:' songloft-player/pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u '+%Y-%m-%d_%H:%M:%S')
          {
            echo "tag=$TAG"
            echo "channel_version=$CHANNEL_VERSION"
            echo "so_version=$SO_VERSION"
            echo "version_code=$VERSION_CODE"
            echo "git_commit=$GIT_COMMIT"
            echo "build_time=$BUILD_TIME"
          } >> "$GITHUB_OUTPUT"
          echo "解析: tag=$TAG so_version=$SO_VERSION channel=$CHANNEL_VERSION versionCode=$VERSION_CODE commit=$GIT_COMMIT"

      - name: Guard mobile export surface (frozen)
        run: |
          # 只换 .so 的前提：mobile 包导出面不变（否则 JNI 符号与随包 classes.jar 对不上）。
          go doc ./mobile | grep '^func ' | sort > /tmp/current_surface.txt
          sort mobile/export_surface.txt > /tmp/expected_surface.txt
          if ! diff -u /tmp/expected_surface.txt /tmp/current_surface.txt; then
            echo "::error::mobile 包导出面已变更！只换 libgojni.so 不安全（须连 DEX/整包一起发）。"
            echo "若确为有意变更，请同步更新 mobile/export_surface.txt 并改走整包 bundle 发布。"
            exit 1
          fi
          echo "导出面守卫通过。"

      - name: Build Go backend as Android .aar (VERSION=so_version)
        env:
          VERSION: ${{ steps.meta.outputs.so_version }}
          TRACELY_APP_ID: ${{ secrets.TRACELY_APP_ID }}
          TRACELY_APP_SECRET: ${{ secrets.TRACELY_APP_SECRET }}
          TRACELY_HOST: ${{ secrets.TRACELY_HOST }}
        run: make build-go-mobile-android

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        run: |
          cd songloft-player
          flutter pub get

      - name: Setup Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          fi

      - name: Build APK with embedded backend (split-per-abi)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # libapp.so 与线上同渠道（FRONTEND_VERSION=基线），libgojni.so 用上一步的 aar。
          cd songloft-player
          flutter build apk --release --split-per-abi \
            --dart-define=HAS_BACKEND=true \
            --dart-define=FRONTEND_VERSION=${{ steps.meta.outputs.channel_version }} \
            --dart-define=FRONTEND_BUILD_TIME=${{ steps.meta.outputs.build_time }} \
            --dart-define=FRONTEND_GIT_COMMIT=${{ steps.meta.outputs.git_commit }} \
            --dart-define=TRACELY_APP_ID=${{ secrets.TRACELY_APP_ID }} \
            --dart-define=TRACELY_APP_SECRET=${{ secrets.TRACELY_APP_SECRET }} \
            --dart-define=TRACELY_HOST=${{ secrets.TRACELY_HOST }}

      - name: Pack per-ABI patches (frontend zip + backend so) + manifests
        id: pack
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          SO_VERSION: ${{ steps.meta.outputs.so_version }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          PATCH_LABEL: ${{ inputs.patch_label }}
          GIT_COMMIT: ${{ steps.meta.outputs.git_commit }}
          BUILD_TIME: ${{ steps.meta.outputs.build_time }}
        run: |
          set -e
          mkdir -p out
          cd songloft-player
          for abi in arm64-v8a armeabi-v7a; do
            apk="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            if [ ! -f "$apk" ]; then
              echo "跳过 $abi（无 APK: $apk）"; continue
            fi

            # —— 前端补丁（libapp.so 打成 patch.zip）——
            rm -rf dist
            dart run flutter_patcher:pack \
              --apk "$apk" \
              --version "$PATCH_LABEL" \
              --target-version-code "$VERSION_CODE" \
              --abi "$abi"
            cp dist/patch.zip "../out/patch-${abi}.zip"
            ZIP_MD5=$(md5sum "../out/patch-${abi}.zip" | cut -d' ' -f1)
            cat > "../out/manifest-${abi}.json" <<EOF
          {
            "hasUpdate": true,
            "patch": {
              "version": "${PATCH_LABEL}",
              "patchUrl": "https://github.com/${REPO}/releases/download/${TAG}/patch-${abi}.zip",
              "md5": "${ZIP_MD5}",
              "targetVersionCode": ${VERSION_CODE}
            }
          }
          EOF

            # —— 后端补丁（从 APK 抽 libgojni.so）——
            unzip -p "$apk" "lib/${abi}/libgojni.so" > "../out/libgojni-${abi}.so"
            # soname 去重的前置铁律：DT_SONAME 必须为 libgojni.so
            SONAME=$(readelf -d "../out/libgojni-${abi}.so" | sed -n 's/.*SONAME.*\[\(.*\)\].*/\1/p')
            if [ "$SONAME" != "libgojni.so" ]; then
              echo "::error::libgojni-${abi}.so 的 DT_SONAME=[$SONAME]，预加载 soname 去重将失效"
              exit 1
            fi
            SO_MD5=$(md5sum "../out/libgojni-${abi}.so" | cut -d' ' -f1)
            SO_SIZE=$(stat -c%s "../out/libgojni-${abi}.so")
            cat > "../out/backend-manifest-${abi}.json" <<EOF
          {
            "hasUpdate": true,
            "backend": {
              "abi": "${abi}",
              "version": "${SO_VERSION}",
              "patchLabel": "${PATCH_LABEL}",
              "gitCommit": "${GIT_COMMIT}",
              "buildTime": "${BUILD_TIME}",
              "targetVersionCode": ${VERSION_CODE},
              "soUrl": "https://github.com/${REPO}/releases/download/${TAG}/libgojni-${abi}.so",
              "md5": "${SO_MD5}",
              "size": ${SO_SIZE}
            }
          }
          EOF
            echo "打包 $abi: soname=$SONAME so_md5=$SO_MD5 zip_md5=$ZIP_MD5"
          done
          ls -lh ../out/

      - name: Upload patch assets to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            out/manifest-*.json out/patch-*.zip \
            out/backend-manifest-*.json out/libgojni-*.so \
            --clobber
          echo "已上传前端+后端补丁到 Release ${{ steps.meta.outputs.tag }}"
