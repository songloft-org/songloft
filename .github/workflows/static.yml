# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'addon/**'
      - 'README.md'
      - 'README.en.md'
      - 'CHANGELOG.md'
      - 'PRIVACY.md'
      - 'PRIVACY.en.md'
      - 'NOTICE'
      - 'NOTICE.en'
      - '.github/workflows/static.yml'
  # Runs on issue events
  issues:
    types: [opened, edited, reopened]  # Specify events you're interested in
  issue_comment:
    types: [created, deleted, edited]

  release:
    types:
      - uploaded

  workflow_run:
    workflows:
      - Tests
    types:
      - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Checkout doc submodules
        run: git submodule update --init --depth 1 songloft-player plugin-toolchain

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: ./docs  # 指定工作目录为 docs
        env:
          # 截图脚本用系统 Chrome，CI 不跑截图，无需下载 Playwright 浏览器内核
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: |
          npm install

      - name: Build VitePress
        env:
          VITE_GITHUB_ISSUES_TOKEN: ${{ secrets.VITE_GITHUB_ISSUES_TOKEN }}
        working-directory: ./docs  # 指定工作目录为 docs
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          # Upload entire repository
          path: './docs/.vitepress/dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
