name: Bug 报告
description: 报告一个 Bug，帮助我们改进 Songloft
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交 Bug 报告！请尽量填写以下信息，这能帮助我们更快定位和修复问题。

  - type: input
    id: version
    attributes:
      label: Songloft 版本
      description: 服务端版本号（可在设置页面或 API `/api/v1/upgrade/check` 查看）
      placeholder: 例如 1.2.0
    validations:
      required: true

  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - Docker
        - 二进制直接运行
        - 其他
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 客户端平台
      description: 如果问题与客户端相关，请选择平台
      options:
        - Web（浏览器）
        - Android
        - iOS
        - Windows
        - macOS
        - Linux
        - 不涉及客户端
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述遇到的问题
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按步骤描述如何复现此问题
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你认为正确的行为应该是什么
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志文件 / 截图
      description: >-
        **强烈建议附上日志文件**：在客户端「设置 → 关于与更新 → 导出日志」一键打包前后端日志（已脱敏）为 zip，
        然后把 zip 文件拖拽到本输入框内即可上传。日志能极大加快问题定位。

        如无法导出（如纯 Web 使用），Docker 用户可用 `docker logs songloft` 获取后端日志粘贴在此；
        界面异常也欢迎附上截图。
      placeholder: 将「导出日志」得到的 zip 拖拽到此处上传，或粘贴日志文本 / 截图
    validations:
      required: false
