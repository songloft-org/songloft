            additionalProperties:
              type: string
            type: object
        "500":
          description: 读取目录失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取子目录列表
      tags:
      - 扫描管理
  /scan/fingerprints:
    post:
      consumes:
      - application/json
      description: 异步为本地歌曲计算音频指纹，需要 ffmpeg 支持 chromaprint。若已有任务在运行则打断重启。传入 recompute_all=true
        时清空已有指纹后重新计算全部。
      parameters:
      - description: 计算选项
        in: body
