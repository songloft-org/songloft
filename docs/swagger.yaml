  /scan:
    post:
      consumes:
      - application/json
      description: |-
        异步扫描音乐目录并导入新发现的音乐文件到数据库，立即返回，可通过进度接口查询状态。
        reimport=true 时对已入库文件也重新提取元数据；默认 false 走增量（跳过已存在且时长有效的文件）。
        paths 为目录级定向扫描（Issue #262）：省略/为空时扫描整个音乐根目录；非空时只扫描给定目录（含子目录），
        且过期记录清理仅收敛到这些目录之内（不影响其余曲库）。每个目录必须位于音乐根目录之下，否则返回 400。
      parameters:
      - description: 扫描请求参数
        in: body
        name: request
        schema:
          $ref: '#/definitions/handlers.ScanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 扫描任务已启动
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 指定目录不在音乐目录下
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 扫描正在进行中
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 启动扫描失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 扫描并导入本地音乐
      tags:
      - 扫描管理
