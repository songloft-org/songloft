      - BearerAuth: []
      summary: 从注册表安装插件
      tags:
      - JS插件管理
  /jsplugins/registry/refresh:
    post:
      consumes:
      - application/json
      description: 拉取订阅源（含递归 includes），去重合并后返回分页的可用插件列表。每个插件标注是否已安装及是否有更新。默认拉取单个 registry_url，可选传入
        token 字段访问需要认证的私有源（如 GitHub 私有仓库 PAT）。当 all_sources=true 时忽略 registry_url/token，改为聚合已保存的所有启用订阅源（各源用自身存储的
        token），跨源按 entry_path 去重、高版本优先。
      parameters:
      - description: 刷新请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.registryRefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 插件列表
          schema:
            $ref: '#/definitions/handlers.registryRefreshResponse'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 拉取注册表失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 刷新插件注册表
      tags:
      - JS插件管理
