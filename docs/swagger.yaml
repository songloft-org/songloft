      - application/json
      responses:
        "200":
          description: 安装结果（更新已有插件）
          schema:
            $ref: '#/definitions/handlers.jsPluginUploadResponse'
        "201":
          description: 安装结果（新插件）
          schema:
            $ref: '#/definitions/handlers.jsPluginUploadResponse'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 下载或安装失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
