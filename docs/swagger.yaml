      parameters:
      - description: 开关请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.pluginAutoUpdateSetting'
      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段表示更新后的开关状态
          schema:
            $ref: '#/definitions/handlers.pluginAutoUpdateSetting'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存插件自动更新开关
      tags:
      - 设置
