      produces:
      - application/json
      responses:
        "200":
          description: 返回 enabled 字段表示更新后的开关状态
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: 请求格式错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新 HLS 代理开关
      tags:
      - 电台与 HLS
  /settings/http-proxy:
    get:
