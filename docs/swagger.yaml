      - 歌曲管理
  /songs/refresh-metadata:
    post:
      description: 对所有元数据缺失的远程歌曲，通过 ffprobe 探测时长、比特率、采样率、格式及标签并回填。已在运行时返回 409。
      produces:
      - application/json
      responses:
        "202":
          description: 已启动
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 已在运行
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 启动失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 刷新远程歌曲元数据
      tags:
      - 歌曲管理
  /songs/refresh-metadata/cancel:
    post:
      description: 取消正在执行的远程歌曲元数据刷新任务
      produces:
      - application/json
      responses:
        "204":
          description: 已取消
      security:
      - BearerAuth: []
      summary: 取消元数据刷新
      tags:
      - 歌曲管理
  /songs/refresh-metadata/progress:
    get:
      description: 轮询远程歌曲元数据刷新的执行状态和进度
      produces:
      - application/json
      responses:
        "200":
          description: 进度信息
          schema:
            $ref: '#/definitions/services.MetadataRefreshProgress'
      security:
      - BearerAuth: []
      summary: 获取元数据刷新进度
      tags:
      - 歌曲管理
  /songs/remote:
    post:
      consumes:
      - application/json
      description: 批量添加网络歌曲到数据库。cover_url 支持以 "/" 开头的相对路径（插件场景下由服务端自动解析为内部 URL，与歌词
        lyric_remote_url 的解析机制一致）。lyric_remote_url 为歌词远程 URL 直传字段，提供时优先于 lyric + lyric_source=url
        的间接方式。副作用：插入成功后，对缺失技术元数据（duration/bitrate/samplerate/format）的歌曲异步探测补齐（限并发后台执行，不阻塞响应），确保
        WebDAV 等无法自带时长的音源在首次播放前就落库 duration，供音箱等仅依赖服务端时长的消费端自动切歌。
      parameters:
      - description: 网络歌曲列表
        in: body
        name: request
        required: true
        schema:
          items:
            properties:
              album:
                type: string
              artist:
                type: string
              cover_url:
                type: string
              dedup_key:
                type: string
              duration:
                type: number
              is_video:
                type: boolean
              lyric:
                type: string
              lyric_remote_url:
                type: string
              lyric_source:
                type: string
              plugin_entry_path:
                type: string
              source_data:
                type: string
              title:
                type: string
              url:
                type: string
            type: object
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: 添加成功
          schema:
            properties:
              count:
                type: integer
              songs:
                items:
                  $ref: '#/definitions/models.Song'
                type: array
            type: object
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 添加失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量添加网络歌曲
      tags:
      - 歌曲管理
  /upgrade/check:
    get:
      consumes:
      - application/json
      description: 检查是否有可用的新版本
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回更新检查结果
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 检查更新失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 检查更新
      tags:
      - 系统升级
  /upgrade/progress:
    get:
      consumes:
      - application/json
      description: 获取当前升级任务的进度信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回升级进度
          schema:
            $ref: '#/definitions/models.UpgradeProgress'
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取升级进度
      tags:
      - 系统升级
  /upgrade/reset:
    post:
      consumes:
      - application/json
      description: 将二进制文件回退到 Docker 镜像中的原始版本，然后重启服务
      produces:
      - application/json
      responses:
        "200":
          description: 回退已开始
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "403":
          description: 非 Docker 环境不支持回退
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 回退到底包版本
      tags:
      - 系统升级
  /upgrade/start:
    post:
      consumes:
      - application/json
      description: 开始升级到指定版本
      parameters:
      - description: '升级请求 {version_type: stable|dev}'
        in: body
        name: request
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 升级已开始
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 升级失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 开始升级
      tags:
      - 系统升级
  /upgrade/versions:
    get:
      consumes:
      - application/json
      description: 获取正式版和测试版的版本信息
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回版本信息
          schema:
            additionalProperties: true
            type: object
        "403":
          description: 非 Docker 环境不支持升级
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 获取版本信息失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取可用版本信息
      tags:
      - 系统升级
  /version:
    get:
      consumes:
      - application/json
      description: 获取应用的版本信息，包括版本号、Git提交哈希和构建时间
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回版本信息
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取应用版本信息
      tags:
      - 系统管理
securityDefinitions:
  BearerAuth:
    description: 输入 "Bearer {token}" 进行认证
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
