      consumes:
      - application/json
      description: 设置检查更新 / 升级使用的 GitHub 代理前缀（如 https://ghfast.top/）。设为空字符串则直连。仅持久化，不影响其它模块的全局
        HTTP 代理。
      parameters:
      - description: GitHub 更新代理配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.githubProxySetting'
      produces:
      - application/json
      responses:
        "200":
          description: 保存后的配置
          schema:
            $ref: '#/definitions/handlers.githubProxySetting'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存 GitHub 更新代理配置
      tags:
      - 系统升级
  /settings/hls-proxy:
