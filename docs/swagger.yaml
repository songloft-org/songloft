            additionalProperties: true
            type: object
        "400":
          description: chromaprint 不可用
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 触发批量指纹计算
      tags:
      - 扫描管理
  /scan/fingerprints/progress:
    get:
      description: 查询当前指纹计算任务的进度
      produces:
      - application/json
      responses:
        "200":
          description: 计算进度
          schema:
            $ref: '#/definitions/services.FingerprintProgress'
      security:
      - BearerAuth: []
      summary: 获取指纹计算进度
      tags:
      - 扫描管理
  /scan/fingerprints/status:
    get:
      description: 返回 ffmpeg chromaprint 可用性以及本地歌曲指纹计算统计
      produces:
      - application/json
      responses:
        "200":
          description: 指纹状态
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取指纹计算状态
      tags:
      - 扫描管理
  /scan/progress:
    get:
      consumes:
      - application/json
      description: 获取当前扫描任务的进度信息
      produces:
      - application/json
      responses:
        "200":
          description: 扫描进度信息
          schema:
            $ref: '#/definitions/services.ScanProgress'
      security:
      - BearerAuth: []
      summary: 获取扫描进度
      tags:
      - 扫描管理
  /settings/auto-scan:
    get:
      description: 返回自动扫描的启用状态和扫描间隔（秒）。默认关闭，间隔 3600 秒（1 小时）。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AutoScanSetting'
      security:
      - BearerAuth: []
      summary: 获取自动扫描配置
      tags:
      - 扫描管理
    put:
      consumes:
      - application/json
      description: 设置自动扫描的启用状态和扫描间隔。interval_seconds 有效范围 [60, 86400]。更新后立即生效（无需重启）。
      parameters:
      - description: 自动扫描配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AutoScanSetting'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AutoScanSetting'
        "400":
          description: 请求格式错误或参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新自动扫描配置
      tags:
      - 扫描管理
  /settings/equalizer:
    get:
      description: 获取全局均衡器（EQ）配置，包含启用状态、预设名称和 10 段频段增益（31Hz–16kHz，单位 dB，范围 -12 ~ +12）。未配置时返回默认值（关闭
        + flat 预设 + 全 0）。
      produces:
      - application/json
      responses:
        "200":
          description: 均衡器配置
          schema:
            $ref: '#/definitions/handlers.equalizerSetting'
      security:
      - BearerAuth: []
      summary: 获取均衡器配置
      tags:
      - 设置
    put:
      consumes:
      - application/json
      description: 保存全局均衡器（EQ）配置。bands 必须包含 10 个元素，每个值在 -12 ~ +12 范围内（单位 dB）。preset
        为预设名称（flat/rock/pop/jazz/classical/bass_boost/treble_boost/vocal/custom）。
      parameters:
      - description: 均衡器配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.equalizerSetting'
      produces:
      - application/json
      responses:
        "200":
          description: 保存后的均衡器配置
          schema:
            $ref: '#/definitions/handlers.equalizerSetting'
        "400":
          description: 请求格式错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存均衡器配置
      tags:
      - 设置
  /settings/github-proxy:
    get:
