  /songs/{id}/played:
    post:
      description: 客户端在歌曲开始播放、播放完成或被跳过时调用此端点，后端将事件广播给已订阅播放事件的 JS 插件（通过 songloft.events.onPlayEvent
        注册）。source 参数标识调用来源，如 songloft-player（官方客户端）、miot（小爱音箱插件）等。type 参数标识事件类型：play（开始播放）、finish（播放完成）、skip（用户跳过）。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 调用来源标识，如 songloft-player、miot
        in: query
        name: source
        type: string
      - description: 事件类型：play、finish、skip，默认 finish
        enum:
        - play
        - finish
        - skip
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: 无内容
        "400":
          description: 无效的歌曲 ID 或事件类型
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: 歌曲不存在
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 通知歌曲播放事件
      tags:
      - 歌曲管理
  /songs/batch-delete:
    post:
      consumes:
      - application/json
      description: 根据歌曲 ID 列表批量删除歌曲。设置 delete_files=true 时同步删除本地音频文件（用于去重等场景）
      parameters:
      - description: 批量删除请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.BatchDeleteSongsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/models.BatchDeleteSongsResponse'
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 删除失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量删除歌曲
      tags:
      - 歌曲管理
  /songs/clean:
    post:
      consumes:
      - application/json
      description: 清理本地歌曲中文件已不存在或位于排除目录中的记录，同时删除关联的封面文件
      produces:
      - application/json
      responses:
        "200":
          description: 清理成功
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 清理失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 清理无效的本地歌曲
      tags:
      - 歌曲管理
  /songs/duplicates:
    get:
      description: 通过音频指纹查询本地歌曲中内容相同的重复组
      produces:
      - application/json
      responses:
        "200":
          description: 重复歌曲组列表
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取重复歌曲组
      tags:
      - 歌曲管理
  /songs/facets:
    get:
      description: |-
        按指定维度聚合曲库，返回该维度下非空取值、各自的歌曲数量及一首代表歌曲的封面 URL，用于「分类浏览」的卡片网格。
        支持维度：genre(流派)/artist(歌手)/album(专辑)/language(语种)/style(风格)/year(年份)/decade(年代)。
        year/decade 的 value 为数字字符串（年代如 "1990" 表示 1990-1999）。取到某取值后可用 /songs?<field>=<value> 拉取该分类下歌曲。
        支持 keyword 模糊搜索取值、limit/offset 分页、sort(count|name)/order 排序；返回 total 为该维度去重取值总数。
      parameters:
      - description: 聚合维度
        enum:
        - genre
        - artist
        - album
        - language
        - style
        - year
        - decade
        in: query
        name: field
        required: true
        type: string
      - description: 对取值模糊搜索
        in: query
        name: keyword
        type: string
      - description: 分页大小，缺省 20，上限 100000
        in: query
        name: limit
        type: integer
      - description: 分页偏移，缺省 0
        in: query
        name: offset
        type: integer
      - description: 排序维度，缺省 count
        enum:
        - count
        - name
        in: query
        name: sort
        type: string
      - description: 排序方向；count 缺省 desc，name 缺省 asc
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回聚合结果 {field, facets:[{value,count,cover_url}], total, limit,
            offset}
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 缺少或不支持的 field
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 曲库标签分类聚合
      tags:
      - 歌曲管理
  /songs/ids:
    get:
      consumes:
      - application/json
      description: 与 /songs 共享过滤条件，仅返回 ID。用于「全选当前筛选范围」场景。
      parameters:
      - description: 歌曲类型
        in: query
        name: type
        type: string
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 按 file_path 前缀过滤
        in: query
        name: path_prefix
        type: string
      - description: 按流派精确过滤
        in: query
        name: genre
        type: string
      - description: 按歌手精确过滤
        in: query
        name: artist
        type: string
      - description: 按专辑精确过滤
        in: query
        name: album
        type: string
      - description: 按语种精确过滤
        in: query
        name: language
        type: string
      - description: 按风格精确过滤
        in: query
        name: style
        type: string
      - description: 按发行年份精确过滤
        in: query
        name: year
        type: integer
      - description: 按年代过滤（起始年，如 1990 匹配 1990-1999）
        in: query
        name: decade
        type: integer
      - default: hidden
        description: 排除属于这些 label 歌单的歌曲(逗号分隔), 默认 hidden; 传 none 显示全部
        in: query
        name: exclude_playlist_labels
        type: string
      - description: 排序字段，缺省 added_at
        enum:
        - id
        - title
        - artist
        - album
        - duration
        - added_at
        - updated_at
        - file_modified_at
        - year
        - genre
        in: query
        name: sort
        type: string
      - description: 排序方向，缺省 desc
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回 ID 列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取匹配歌曲的 ID 列表
      tags:
      - 歌曲管理
  /songs/radio:
    post:
      consumes:
      - application/json
      description: 批量添加电台/广播到数据库
      parameters:
      - description: 电台/广播列表
