basePath: /api/v1
definitions:
  handlers.AutoScanSetting:
    properties:
      enabled:
        type: boolean
      interval_seconds:
        type: integer
    type: object
  handlers.MusicPathSetting:
    properties:
      auto_create_exclude_dirs:
        items:
          type: string
        type: array
      exclude_dirs:
        items:
          type: string
        type: array
      exclude_paths:
        items:
          type: string
        type: array
      path:
        type: string
    type: object
  handlers.ScanRequest:
    properties:
      paths:
        description: |-
          Paths 为目录级定向扫描（Issue #262）：为空时扫描整个音乐根目录（默认行为）；
          非空时只扫描给定目录（含子目录），过期记录清理也仅收敛到这些目录之内。
          每个目录必须位于音乐根目录之下，否则返回 400。
        items:
          type: string
        type: array
      reimport:
        type: boolean
    type: object
  handlers.WriteSongTagsRequest:
    properties:
      album:
        type: string
      artist:
        type: string
      clear_cover:
        type: boolean
      cover_data:
        type: string
      cover_url:
        type: string
      genre:
        type: string
      language:
        type: string
      lyrics:
        type: string
      rename_file:
        description: RenameFile 为 true 时按新标题重命名本地音频文件（保留原目录与扩展名），仅对本地非 CUE 歌曲生效。
        type: boolean
      style:
        type: string
      title:
        type: string
      track:
        type: string
      year:
        type: integer
    type: object
  handlers.audioTracksResponse:
    properties:
      tracks:
        items:
          $ref: '#/definitions/services.AudioTrackInfo'
        type: array
    type: object
  handlers.dirValidateRequest:
    properties:
      path:
        type: string
    type: object
  handlers.dirValidateResponse:
    properties:
      created:
        type: boolean
      error:
        type: string
      free_size:
        type: integer
      total_size:
        type: integer
      valid:
        type: boolean
    type: object
  handlers.equalizerSetting:
    properties:
      bands:
        items:
          type: number
        type: array
      enabled:
        type: boolean
      preset:
        type: string
    type: object
  handlers.githubProxySetting:
    properties:
      proxy:
        type: string
    type: object
  handlers.hlsProxySettingRequest:
    properties:
      enabled:
        type: boolean
    type: object
  handlers.httpProxySetting:
    properties:
      proxy:
        type: string
    type: object
  handlers.jsPluginBatchUpdateResponse:
    properties:
      failed:
        type: integer
      message:
        type: string
      results:
        items:
          $ref: '#/definitions/handlers.jsPluginBatchUpdateResult'
        type: array
      skipped:
        type: integer
      total:
        type: integer
      updated:
        type: integer
    type: object
  handlers.jsPluginBatchUpdateResult:
    properties:
      current_version:
        type: string
      entry_path:
        type: string
      error:
        type: string
      has_update:
        type: boolean
      new_version:
        type: string
      plugin_id:
        type: integer
      plugin_name:
        type: string
      success:
        type: boolean
    type: object
  handlers.jsPluginUploadResponse:
    properties:
      failed:
        type: integer
      message:
        type: string
      results:
        items:
          $ref: '#/definitions/handlers.jsPluginUploadResult'
        type: array
      success:
        type: integer
      total:
        type: integer
    type: object
  handlers.jsPluginUploadResult:
    properties:
      error:
        type: string
      file_name:
        type: string
      plugin:
        $ref: '#/definitions/jsplugin.JSPlugin'
      success:
        type: boolean
    type: object
  handlers.libraryBrowseSetting:
    properties:
      views:
        items:
          $ref: '#/definitions/handlers.libraryBrowseView'
        type: array
    type: object
  handlers.libraryBrowseView:
    properties:
      key:
        type: string
      visible:
        type: boolean
    type: object
  handlers.logLevelSettingRequest:
    properties:
      level:
        type: string
    type: object
  handlers.pluginAutoUpdateSetting:
    properties:
      enabled:
        type: boolean
    type: object
  handlers.pluginHealthResponse:
    properties:
      plugins:
        items:
          $ref: '#/definitions/source.PluginHealthSnapshot'
        type: array
    type: object
  handlers.pluginKeepAliveSetting:
    properties:
      plugins:
        items:
          type: string
        type: array
    type: object
  handlers.pluginRegistriesSetting:
    properties:
      registries:
        items:
          $ref: '#/definitions/jsplugin.RegistryConfig'
        type: array
    type: object
  handlers.pluginTabEntry:
    properties:
      entry_path:
        type: string
      name:
        type: string
      plugin_id:
        type: integer
    type: object
  handlers.proxyAllowlistSettingRequest:
    properties:
      allowlist:
        items:
          type: string
        type: array
    type: object
  handlers.registryInstallRequest:
    properties:
      download_url:
        type: string
      github_proxy:
        type: string
      source_url:
        description: |-
          SourceURL 插件所属订阅源 URL。「全部」聚合模式安装时回传：
          当未显式提供 token 时，后端据此从 plugin_registries 配置解析该源的 token。
        type: string
      token:
        type: string
    type: object
  handlers.registryPluginEntry:
    properties:
      author:
        type: string
      description:
        type: string
      download_url:
        type: string
      entry_path:
        type: string
      has_update:
        type: boolean
      homepage:
        type: string
      icon:
        type: string
      installed:
        type: boolean
      installed_version:
        type: string
      name:
        type: string
      source_url:
        description: |-
          SourceURL 该插件所属订阅源 URL（仅「全部」聚合模式返回），
          安装时回传给后端以按源解析私有源 token。
        type: string
      version:
        type: string
    type: object
  handlers.registryRefreshRequest:
    properties:
      all_sources:
        type: boolean
      github_proxy:
        type: string
      page:
        type: integer
      page_size:
        type: integer
      registry_url:
        type: string
      search:
        type: string
      token:
        type: string
    type: object
  handlers.registryRefreshResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      plugins:
        items:
          $ref: '#/definitions/handlers.registryPluginEntry'
        type: array
      total:
        type: integer
      warnings:
        items:
          type: string
        type: array
    type: object
  handlers.remoteTitleSourceRequest:
    properties:
      title_source:
        enum:
        - tag
        - filename
        example: filename
        type: string
    type: object
  handlers.scanAutoCreatePlaylistsRequest:
    properties:
      enabled:
        type: boolean
    type: object
  handlers.scanPlaylistModeRequest:
    properties:
      mode:
        enum:
        - directory
        - top_level
        - bubble_up
        example: directory
        type: string
    type: object
  handlers.scanPlaylistModeResponse:
    properties:
      mode:
        example: directory
        type: string
    type: object
  handlers.scanTitleSourceRequest:
    properties:
      title_source:
        enum:
        - tag
        - filename
        example: tag
        type: string
    type: object
  handlers.startFingerprintRequest:
    properties:
      recompute_all:
        type: boolean
    type: object
  handlers.tabConfigSetting:
    properties:
      plugin_tabs:
        items:
          $ref: '#/definitions/handlers.pluginTabEntry'
        type: array
      show_library:
        type: boolean
      show_playlists:
        type: boolean
    type: object
  handlers.userPreferencesSetting:
    properties:
      audio_quality:
        type: string
      local_cache_max_size:
        type: integer
      play_mode:
        type: string
      playlist_view_mode:
        type: string
      theme_mode:
        type: string
      volume:
        type: number
    type: object
  jsplugin.JSPlugin:
    properties:
      author:
        type: string
      created_at:
        type: string
      description:
        type: string
      download_url:
        type: string
      entry_hash:
        description: main.js/main.jsc 内容 SHA256
        type: string
      entry_path:
        description: 路由前缀（如 "myplugin"）
        type: string
      external_paths:
        description: 可访问的外部绝对路径目录
        items:
          type: string
        type: array
      file_mod_time:
        type: string
      file_path:
        description: ZIP 文件相对路径
        type: string
      homepage:
        type: string
      icon:
        type: string
      id:
        type: integer
      license:
        type: string
      main:
        description: 入口文件路径（如 "main.js"）
        type: string
      min_host_version:
        type: string
      name:
        type: string
      permissions:
        description: 权限列表
        items:
          type: string
        type: array
      public_paths:
        description: 无需 JWT 认证的路径前缀
        items:
          type: string
        type: array
      status:
        $ref: '#/definitions/models.JSPluginStatus'
      update_url:
        type: string
      updated_at:
        type: string
      version:
        type: string
      zip_hash:
        description: ZIP 文件 SHA256
        type: string
    type: object
  jsplugin.RegistryConfig:
    properties:
      enabled:
        type: boolean
      name:
        type: string
      token:
        type: string
      url:
        type: string
    type: object
  models.BatchDeletePlaylistsRequest:
    properties:
      ids:
        description: 要删除的歌单 ID 列表
        example:
        - 1
        items:
          type: integer
        type: array
    type: object
  models.BatchDeletePlaylistsResponse:
    properties:
      deleted:
        description: 实际删除的数量
        example: 3
        type: integer
    type: object
  models.BatchDeleteSongsRequest:
    properties:
      delete_files:
        description: 是否同步删除本地音频文件
        example: false
        type: boolean
      ids:
        description: 要删除的歌曲 ID 列表
        example:
        - 1
        items:
          type: integer
        type: array
    type: object
  models.BatchDeleteSongsResponse:
    properties:
      deleted:
        description: 实际删除的数量
        example: 3
        type: integer
    type: object
  models.Config:
    properties:
      id:
        description: 配置ID
        example: 1
        type: integer
      key:
        description: 配置键
        example: music_path
        type: string
      updated_at:
        description: 更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
      value:
        description: 配置值（JSON格式）
        example: '{"path":"/music"}'
        type: string
    type: object
  models.CreateConfigRequest:
    properties:
      key:
        description: 配置键
        example: music_path
        type: string
      value:
        description: 配置值（JSON 格式）
        example: '{"path":"/music"}'
        type: string
    required:
    - key
    - value
    type: object
  models.ErrorResponse:
    properties:
      detail:
        description: 详细错误信息（可选）
        example: 详细错误信息
        type: string
      error:
        description: 错误信息
        example: 操作失败
        type: string
    type: object
  models.ImportResult:
    properties:
      playlists_created:
        type: integer
      playlists_merged:
        type: integer
      songs_created:
        type: integer
      songs_matched:
        type: integer
      songs_skipped:
        type: integer
    type: object
  models.JSPluginStatus:
    enum:
    - active
    - inactive
    - error
    type: string
    x-enum-comments:
      JSPluginStatusActive: 激活状态
      JSPluginStatusError: 错误状态
      JSPluginStatusInactive: 未激活状态
    x-enum-descriptions:
    - 激活状态
    - 未激活状态
    - 错误状态
    x-enum-varnames:
    - JSPluginStatusActive
    - JSPluginStatusInactive
    - JSPluginStatusError
  models.LoginRequest:
    properties:
      password:
        description: 密码
        example: admin
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  models.LoginResponse:
    properties:
      access_token:
        description: Access Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      expires_in:
        description: Access Token 过期时间（秒）
        example: 604800
        type: integer
      refresh_token:
        description: Refresh Token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        description: Token 类型
        example: Bearer
        type: string
    type: object
  models.Playlist:
    properties:
      cover_url:
        description: 封面图片 URL
        example: https://example.com/playlist.jpg
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T12:00:00Z"
        type: string
      description:
        description: 歌单描述
        example: 收藏的经典歌曲
        type: string
      id:
        description: 歌单 ID
        example: 1
        type: integer
      labels:
        description: 歌单标签，如 ["built_in"]
        example:
        - '["built_in"]'
        items:
          type: string
        type: array
      name:
        description: 歌单名称
        example: 我的最爱
        type: string
      song_count:
        description: 歌曲数量
        example: 10
        type: integer
      type:
        description: 歌单类型：normal/radio
        enum:
        - normal
        - radio
        example: normal
        type: string
      updated_at:
        description: 最后更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
    type: object
  models.RefreshTokenRequest:
    properties:
      refresh_token:
        description: 刷新令牌
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
    required:
    - refresh_token
    type: object
  models.RevokeTokenRequest:
    properties:
      reason:
        description: 撤销原因
        example: 用户主动登出
        type: string
    type: object
  models.SetPlaylistVisibilityRequest:
    properties:
      hidden:
        description: 是否隐藏歌单
        example: true
        type: boolean
    type: object
  models.Song:
    properties:
      added_at:
        description: 添加时间
        example: "2024-01-01T12:00:00Z"
        type: string
      album:
        description: 专辑名称
        example: 十一月的萧邦
        type: string
      artist:
        description: 艺术家/歌手
        example: 周杰伦
        type: string
      bit_rate:
        description: 比特率（kbps）
        example: 320
        type: integer
      cover_url:
        description: 封面图片URL
        example: https://example.com/cover.jpg
        type: string
      cue_source_path:
        description: CUE 来源路径（非空表示 CUE 拆分歌曲）
        type: string
      cue_track_index:
        description: CUE track 序号 (1-99)
        type: integer
      dedup_key:
        description: 去重 key(由插件定义,典型形态 "<platform>:<platform_id>");与 PluginEntryPath
          组成 UNIQUE
        type: string
      duration:
        description: 播放时长（秒）
        example: 253.5
        type: number
      file_modified_at:
        description: 文件修改时间(mtime，本地歌曲扫描时记录；未知为 nil)
        type: string
      file_path:
        description: 本地文件路径
        example: /music/周杰伦/夜曲.mp3
        type: string
      file_size:
        description: 文件大小（字节）
        example: 10485760
        type: integer
      fingerprint:
        description: 音频指纹(Chromaprint)
        type: string
      fingerprint_duration:
        description: 指纹对应音频时长
        type: number
      format:
        description: 音频格式
        example: mp3
        type: string
      genre:
        description: 流派
        example: Pop
        type: string
      id:
        description: 歌曲ID
        example: 1
        type: integer
      is_live:
        description: 是否为直播流
        example: false
        type: boolean
      is_video:
        description: 是否含真实视频轨(扫描时 ffprobe 探测,排除封面);客户端据此渲染画面/选择投屏 mime
        example: false
        type: boolean
      isrc:
        description: ISRC(国际标准录音编码)
        type: string
      language:
        description: 语种
        example: 国语
        type: string
      lyric_remote_url:
        description: lyric_source=url 时的原始 URL(运行时由 LyricFetcher 拉取)
        type: string
      lyric_url:
        description: 歌词端点 URL(客户端唯一可见字段,指向 /api/v1/songs/{id}/lyric)
        type: string
      plugin_entry_path:
        description: 音源插件 entryPath(网络歌曲)
        example: my-source
        type: string
      sample_rate:
        description: 采样率（Hz）
        example: 44100
        type: integer
      source_cover_url:
        description: 原始封面 URL(仅 JSON 输出,CoverURL 非空时保留原始值供编辑使用)
        type: string
      source_data:
        description: 音源元数据 JSON(给插件 music/url 接口用,opaque)
        type: string
      source_url:
        description: 原始音源 URL(仅 JSON 输出,radio/remote 类型返回原始流地址供编辑使用)
        type: string
      style:
        description: 风格
        example: 抒情
        type: string
      title:
        description: 标题
        example: 夜曲
        type: string
      track:
        description: 音轨号，可为 "3" 或 "3/12"（轨号/总数）
        example: 3/12
        type: string
      type:
        description: 歌曲类型：local/remote/radio
        enum:
        - local
        - remote
        - radio
        example: local
        type: string
      updated_at:
        description: 最后更新时间
        example: "2024-01-01T12:00:00Z"
        type: string
      url:
        description: 网络地址
        example: https://example.com/song.mp3
        type: string
      year:
        description: 发行年份
        example: 2005
        type: integer
    type: object
  models.SuccessResponse:
    properties:
      message:
        description: 成功信息
        example: 操作成功
        type: string
    type: object
  models.TokenInfo:
    properties:
      client_info:
        description: 客户端信息
        example: Mozilla/5.0 AppleWebKit/605.1.15
        type: string
      created_at:
        description: 创建时间
        example: "2024-01-01T12:00:00Z"
        type: string
      expires_at:
        description: 过期时间
        example: "2024-01-08T12:00:00Z"
        type: string
      revoked_at:
        description: 撤销时间
        example: "2024-01-01T12:00:00Z"
        type: string
      revoked_by:
        description: 撤销者
        example: user
        type: string
      revoked_reason:
        description: 撤销原因
        example: 用户主动登出
        type: string
      token_id:
        description: 令牌 ID
        example: abc123
        type: string
      token_type:
        description: 令牌类型
        enum:
        - access
        - refresh
        example: access
        type: string
    type: object
  models.UpdateConfigRequest:
    properties:
      value:
        description: 配置值（JSON 格式）
        example: '{"path":"/new_music"}'
        type: string
    required:
    - value
    type: object
  models.UpdatePlaylistRequest:
    properties:
      cover_path:
        description: 封面图片本地路径（传空字符串清除）
        example: ""
        type: string
      cover_song_id:
        description: 从指定歌曲复制封面（与 cover_path/cover_url 互斥，优先级更高）
        example: 42
        type: integer
      cover_url:
        description: 封面图片 URL（传空字符串清除）
        example: ""
        type: string
      description:
        description: 歌单描述
        example: 收藏的经典歌曲
        type: string
      name:
        description: 歌单名称
        example: 我的最爱
        type: string
    type: object
  models.UpgradeProgress:
    properties:
      current_step:
        description: 当前步骤描述
        example: 正在下载新版本...
        type: string
      error:
        description: 错误信息（如有）
        example: 下载失败
        type: string
      progress:
        description: 进度百分比 (0-100)
        example: 50
        type: integer
      status:
        description: 状态
        enum:
        - idle
        - downloading
        - testing
        - replacing
        - restarting
        - completed
        - failed
        example: downloading
        type: string
    type: object
  services.AudioTrackInfo:
    properties:
      codec:
        type: string
      default:
        type: boolean
      index:
        type: integer
      language:
        type: string
      title:
        type: string
    type: object
  services.CacheConfig:
    properties:
      cache_dir:
        description: 自定义缓存目录，空字符串表示使用默认目录
        type: string
      max_size:
        description: 最大缓存大小（字节），0 表示无限制
        type: integer
      transcode_format:
        description: |-
          TranscodeFormat 缓存网络歌曲落盘时统一转码的目标格式（mp3/m4a/ogg/flac/wav）。
          空字符串表示不转码、按上游原格式落盘（默认）。缺 ffmpeg 或转码失败时优雅降级保留原格式。
        type: string
      transcode_quality:
        description: TranscodeQuality 转码目标码率（128/192/320），空或非法值表示最高质量。仅对有损格式生效。
        type: string
    type: object
  services.CacheConfigResponse:
    properties:
      cache_dir:
        type: string
      default_cache_dir:
        type: string
      max_size:
        type: integer
      transcode_format:
        type: string
      transcode_quality:
        type: string
    type: object
  services.CacheStats:
    properties:
      file_count:
        description: 文件数量
        type: integer
      max_size:
        description: 最大缓存大小（字节），0 表示无限制
        type: integer
      total_size:
        description: 总大小（字节）
        type: integer
    type: object
  services.FingerprintProgress:
    properties:
      computed:
        type: integer
      failed:
        type: integer
      status:
        description: idle, running, done
        type: string
      total:
        type: integer
    type: object
  services.MetadataRefreshProgress:
    properties:
      failed:
        type: integer
      processed:
        type: integer
      status:
        type: string
      total:
        type: integer
    type: object
  services.OrganizeItem:
    properties:
      id:
        type: integer
      target_path:
        type: string
    type: object
  services.OrganizePreviewResult:
    properties:
      error:
        type: string
      id:
        type: integer
      new_path:
        type: string
      old_path:
        type: string
      status:
        type: string
    type: object
  services.OrganizeResult:
    properties:
      error:
        type: string
      file_path:
        type: string
      id:
        type: integer
      status:
        type: string
    type: object
  services.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  services.ScanProgress:
    properties:
      cleaned_files:
        description: 清理的过期文件数
        type: integer
      cue_split_sources:
        description: splitting_cue 阶段已处理的 CUE 来源数
        type: integer
      current_file:
        description: 当前处理的文件
        type: string
      discovered_files:
        description: scanning 阶段已发现的音频文件数
        type: integer
      end_time:
        description: 结束时间
        type: string
      error:
        description: 错误信息
        type: string
      failed_files:
        description: 失败的文件数
        type: integer
      imported_files:
        description: 已导入文件数
        type: integer
      local_song_count:
        description: 扫描完成后数据库中本地歌曲总数
        type: integer
      scanned_files:
        description: 已扫描文件数
        type: integer
      skipped_files:
        description: 跳过的文件数（已存在）
        type: integer
      start_time:
        description: 开始时间
        type: string
      status:
        allOf:
        - $ref: '#/definitions/services.ScanStatus'
        description: 当前状态
      total_files:
        description: 总文件数
        type: integer
    type: object
  services.ScanStatus:
    enum:
    - idle
    - scanning
    - importing
    - splitting_cue
    - creating_playlists
    - completed
    - failed
    - cancelling
    - cancelled
    type: string
    x-enum-comments:
      ScanStatusCancelled: 已取消
      ScanStatusCancelling: 取消中
      ScanStatusCompleted: 已完成
      ScanStatusCreatingPlaylists: 自动创建歌单中
      ScanStatusFailed: 失败
      ScanStatusIdle: 空闲
      ScanStatusImporting: 导入中
      ScanStatusScanning: 扫描文件中
      ScanStatusSplittingCue: CUE 整轨切分中
    x-enum-descriptions:
    - 空闲
    - 扫描文件中
    - 导入中
    - CUE 整轨切分中
    - 自动创建歌单中
    - 已完成
    - 失败
    - 取消中
    - 已取消
    x-enum-varnames:
    - ScanStatusIdle
    - ScanStatusScanning
    - ScanStatusImporting
    - ScanStatusSplittingCue
    - ScanStatusCreatingPlaylists
    - ScanStatusCompleted
    - ScanStatusFailed
    - ScanStatusCancelling
    - ScanStatusCancelled
  source.HealthClass:
    enum:
    - green
    - yellow
    - red
    type: string
    x-enum-comments:
      HealthGreen: 成功率 ≥ green_threshold 且 samples ≥ min_samples
      HealthRed: 成功率 < red_threshold 且 samples ≥ min_samples
      HealthYellow: 介于 green 与 red 之间;或 samples 不足
    x-enum-descriptions:
    - 成功率 ≥ green_threshold 且 samples ≥ min_samples
    - 介于 green 与 red 之间;或 samples 不足
    - 成功率 < red_threshold 且 samples ≥ min_samples
    x-enum-varnames:
    - HealthGreen
    - HealthYellow
    - HealthRed
  source.Outcome:
    properties:
      latency_ns:
        description: 纳秒;swagger 显式声明避免 time.Duration 解析失败
        type: integer
      plugin_entry_path:
        type: string
      reason:
        type: string
      result:
        $ref: '#/definitions/source.OutcomeResult'
      size_bytes:
        type: integer
      timestamp:
        type: string
    type: object
  source.OutcomeResult:
    enum:
    - success
    - network_fail
    - probe_fail
    - validation_fail
    - plugin_invocation_fail
    type: string
    x-enum-comments:
      OutcomeNetworkFail: HTTP 错误、超时、读流中断
      OutcomePluginInvocationFail: 插件 music/url 返回错误或非 200
      OutcomeProbeFail: ffprobe / tag.ReadFrom 失败
      OutcomeValidationFail: 校验未通过(过短、码率过低等)
    x-enum-descriptions:
    - ""
    - HTTP 错误、超时、读流中断
    - ffprobe / tag.ReadFrom 失败
    - 校验未通过(过短、码率过低等)
    - 插件 music/url 返回错误或非 200
    x-enum-varnames:
    - OutcomeSuccess
    - OutcomeNetworkFail
    - OutcomeProbeFail
    - OutcomeValidationFail
    - OutcomePluginInvocationFail
  source.PluginHealthSnapshot:
    properties:
      class:
        $ref: '#/definitions/source.HealthClass'
      last_failures:
        description: 最近 N 次失败,便于排查
        items:
          $ref: '#/definitions/source.Outcome'
        type: array
      plugin_entry_path:
        type: string
      samples:
        type: integer
      success_rate:
        type: number
    type: object
host: localhost:58091
info:
  contact:
    email: im.hanxi@gmail.com
    name: API Support
    url: https://github.com/songloft-org/songloft
  description: 轻量级音乐服务器 API 文档，支持本地音乐管理、网络歌曲、电台和歌单功能
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Songloft API
  version: 2.11.0
paths:
  /api/v1/jsplugin-assets/{path}:
    get:
      description: 服务由主程序嵌入的插件通用 CSS、JS 和字体文件，自动注入到所有插件 HTML 页面。
      parameters:
      - description: 资源路径
        in: path
        name: '*'
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 资源文件
        "404":
          description: 资源不存在
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 插件公共资源
      tags:
      - JS 插件
  /api/v1/songs/{id}/tags:
    put:
      consumes:
      - application/json
      description: 将元数据写入数据库和本地音频文件标签（仅本地歌曲）。cover_data(base64) 优先于 cover_url。非空字段覆盖，空值保留原值。设置
        clear_cover=true 可显式清空封面。rename_file=true 时按新标题重命名本地音频文件（保留原目录与扩展名，仅本地非 CUE
        歌曲生效）；标题清理后为空或目标文件名已存在时返回 400，与原文件同名则不移动仅写库。
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      - description: 标签数据
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.WriteSongTagsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 写入结果
          schema:
            properties:
              file_write:
                type: string
              song:
                $ref: '#/definitions/models.Song'
            type: object
        "400":
          description: 请求错误
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 写入歌曲标签
      tags:
      - 歌曲管理
  /api/v1/songs/organize:
    post:
      consumes:
      - application/json
      description: 批量移动/重命名本地歌曲文件到指定目录结构。target_path 为相对于 music_path 的路径（含目录和文件名），扩展名必须与原文件一致。CUE
        拆分歌曲会被跳过（status=skip）；目标文件已存在时拒绝覆盖（status=error）。music_path 由服务端自取。
      parameters:
      - description: 整理项目列表
        in: body
        name: request
        required: true
        schema:
          items:
            $ref: '#/definitions/services.OrganizeItem'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: 整理结果
          schema:
            items:
              $ref: '#/definitions/services.OrganizeResult'
            type: array
        "400":
          description: 请求错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 批量整理歌曲文件
      tags:
      - 歌曲管理
  /api/v1/songs/organize/preview:
    post:
      consumes:
      - application/json
      description: dry-run 预览目录整理变更，返回每项 old_path→new_path 与状态（ok/conflict/skip/error），不移动任何文件、不改数据库。target_path
        为相对 music_path 的路径。CUE 歌曲 skip；目标已存在或批内撞名 conflict。music_path 由服务端自取。
      parameters:
      - description: 整理项目列表
        in: body
        name: request
        required: true
        schema:
          items:
            $ref: '#/definitions/services.OrganizeItem'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: 预览结果
          schema:
            items:
              $ref: '#/definitions/services.OrganizePreviewResult'
            type: array
        "400":
          description: 请求错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 预览批量整理歌曲文件
      tags:
      - 歌曲管理
  /auth/login:
    post:
      consumes:
      - application/json
      description: 用户登录获取访问令牌
      parameters:
      - description: 登录请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 登录成功
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "400":
          description: 请求数据错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: 用户名或密码错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: 用户登录
      tags:
      - 认证管理
  /auth/logout:
    post:
      consumes:
      - application/json
      description: 用户登出，撤销当前访问令牌
      produces:
      - application/json
      responses:
        "200":
          description: 登出成功
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 用户登出
      tags:
      - 认证管理
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 刷新成功
          schema:
            $ref: '#/definitions/services.RefreshResponse'
        "400":
          description: 请求数据错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: 刷新令牌无效
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: 刷新令牌
      tags:
      - 认证管理
  /auth/tokens:
    get:
      consumes:
      - application/json
      description: 获取当前用户的所有活跃令牌列表
      parameters:
      - description: 令牌类型
        enum:
        - access
        - refresh
        in: query
        name: type
        type: string
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - default: 0
        description: 偏移量
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 令牌列表
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 列出活跃令牌
      tags:
      - 认证管理
  /auth/tokens/{token_id}:
    delete:
      consumes:
      - application/json
      description: 撤销指定的令牌
      parameters:
      - description: 令牌ID
        in: path
        name: token_id
        required: true
        type: string
      - description: 撤销令牌请求
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RevokeTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 撤销成功
          schema:
            $ref: '#/definitions/models.SuccessResponse'
        "400":
          description: 请求数据错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 服务器错误
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 撤销令牌
      tags:
      - 认证管理
    get:
      consumes:
      - application/json
      description: 获取指定令牌的详细信息
      parameters:
      - description: 令牌ID
        in: path
        name: token_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 令牌信息
          schema:
            $ref: '#/definitions/models.TokenInfo'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: 令牌不存在
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 获取令牌信息
      tags:
      - 认证管理
  /cache-manage/clean:
    post:
      consumes:
      - application/json
      description: 删除服务端所有已缓存的音乐文件,清理后需要重新下载
      produces:
      - application/json
      responses:
        "200":
          description: 清理成功
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 清理失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 清理全部音乐缓存
      tags:
      - 缓存管理
  /cache-manage/config:
    get:
      consumes:
      - application/json
      description: 获取服务端音乐缓存的配置信息,包括最大缓存大小限制、缓存目录路径、缓存转码格式(transcode_format)与码率(transcode_quality)。cache_dir
        为空表示使用 default_cache_dir;transcode_format 为空表示缓存不转码、按原格式落盘。
      produces:
      - application/json
      responses:
        "200":
          description: 缓存配置
          schema:
            $ref: '#/definitions/services.CacheConfigResponse'
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取缓存配置
      tags:
      - 缓存管理
    put:
      consumes:
      - application/json
      description: 更新服务端音乐缓存的配置,如最大缓存大小和缓存目录。cache_dir 为空字符串时恢复使用默认目录。transcode_format
        非空（mp3/m4a/ogg/flac/wav）时,缓存网络歌曲落盘会统一转码为该格式(缺 ffmpeg 或转码失败时保留原格式),transcode_quality
        为可选码率(128/192/320,空或非法为最高质量)。更新后会自动触发 LRU 淘汰检查。切换目录时不会自动迁移旧缓存文件。
      parameters:
      - description: 缓存配置
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/services.CacheConfig'
      produces:
      - application/json
      responses:
        "200":
          description: 更新后的缓存配置
          schema:
            $ref: '#/definitions/services.CacheConfigResponse'
        "400":
          description: 请求参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 更新失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新缓存配置
      tags:
      - 缓存管理
  /cache-manage/stats:
    get:
      consumes:
      - application/json
      description: 获取服务端音乐缓存的统计信息,包括总大小、文件数量和最大缓存限制
      produces:
      - application/json
      responses:
        "200":
          description: 缓存统计信息
          schema:
            $ref: '#/definitions/services.CacheStats'
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取缓存统计信息
      tags:
      - 缓存管理
  /cache-manage/validate-dir:
    post:
      consumes:
      - application/json
      description: 验证指定目录是否可用作缓存目录。目录不存在时自动创建,检查可写性并返回磁盘空间信息。
      parameters:
      - description: 目录路径
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.dirValidateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 验证结果
          schema:
            $ref: '#/definitions/handlers.dirValidateResponse'
        "400":
          description: 请求参数无效
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 验证缓存目录
      tags:
      - 缓存管理
  /configs:
    get:
      consumes:
      - application/json
      description: 获取配置列表，支持关键词搜索和分页
      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - default: 0
        description: 偏移量
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回配置列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取配置列表
      tags:
      - 配置管理
    post:
      consumes:
      - application/json
      description: 创建一个新的配置
      parameters:
      - description: 配置信息
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateConfigRequest'
      produces:
      - application/json
      responses:
        "201":
          description: 创建成功
          schema:
            $ref: '#/definitions/models.Config'
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 创建失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 创建配置
      tags:
      - 配置管理
  /configs/{key}:
    delete:
      consumes:
      - application/json
      description: 根据配置键删除配置
      parameters:
      - description: 配置键
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 无效的配置键
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 删除失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 删除配置
      tags:
      - 配置管理
    get:
      consumes:
      - application/json
      description: 根据配置键获取详细信息
      parameters:
      - description: 配置键
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回配置详情
          schema:
            $ref: '#/definitions/models.Config'
        "404":
          description: 配置不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
