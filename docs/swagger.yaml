            additionalProperties: true
            type: object
        "500":
          description: 收集目录名称失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取所有目录名称
      tags:
      - 扫描管理
  /scan/directories:
    get:
      consumes:
      - application/json
