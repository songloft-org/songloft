        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.proxyAllowlistSettingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 返回更新后的白名单
          schema:
            $ref: '#/definitions/handlers.proxyAllowlistSettingRequest'
        "400":
          description: 请求格式错误或含非法条目
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 保存配置失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新私网代理白名单
      tags:
      - 资源代理
  /settings/remote-title-source:
    get:
