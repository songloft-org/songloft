        "400":
          description: 请求格式错误或校验失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: 保存配置失败
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 保存底部导航栏 Tab 配置
      tags:
      - 设置
