  /songs:
    get:
      consumes:
      - application/json
      description: 获取歌曲列表，支持按类型过滤、关键词搜索和分页。默认排除隐藏歌单里的歌，传 exclude_playlist_labels=none
        显示全部
      parameters:
      - description: 歌曲类型
        enum:
        - local
        - remote
        - radio
        in: query
        name: type
        type: string
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 按 file_path 前缀过滤（如 music/Pop）
        in: query
        name: path_prefix
        type: string
      - description: 按流派精确过滤
        in: query
        name: genre
        type: string
      - description: 按歌手精确过滤
        in: query
        name: artist
        type: string
      - description: 按专辑精确过滤
        in: query
        name: album
        type: string
      - description: 按语种精确过滤
        in: query
        name: language
        type: string
      - description: 按风格精确过滤
        in: query
        name: style
        type: string
      - description: 按发行年份精确过滤
        in: query
        name: year
        type: integer
      - description: 按年代过滤（起始年，如 1990 匹配 1990-1999）
        in: query
        name: decade
        type: integer
      - default: hidden
        description: 排除属于这些 label 歌单的歌曲(逗号分隔), 默认 hidden; 传 none 显示全部
        in: query
        name: exclude_playlist_labels
        type: string
      - default: 20
        description: 每页数量
        in: query
        name: limit
        type: integer
      - default: 0
        description: 偏移量
        in: query
        name: offset
        type: integer
      - description: 排序字段，缺省 added_at
        enum:
        - id
        - title
        - artist
        - album
        - duration
        - added_at
        - updated_at
        - file_modified_at
        - year
        - genre
        in: query
        name: sort
        type: string
      - description: 排序方向，缺省 desc
        enum:
        - asc
        - desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回歌曲列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取歌曲列表
      tags:
      - 歌曲管理
  /songs/{id}:
    delete:
      consumes:
      - application/json
      description: 根据歌曲ID删除歌曲。设置 delete_files=true 时同步删除本地音频文件
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      - description: 是否同时删除本地音频文件
        in: query
        name: delete_files
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: 无效的歌曲ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 删除失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 删除歌曲
      tags:
      - 歌曲管理
    get:
      consumes:
      - application/json
      description: 根据歌曲ID获取详细信息
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 成功返回歌曲详情
          schema:
            $ref: '#/definitions/models.Song'
        "400":
          description: 无效的歌曲ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取单个歌曲详情
      tags:
      - 歌曲管理
    put:
      consumes:
      - application/json
      description: 更新歌曲信息（仅支持网络歌曲和电台）
      parameters:
      - description: 歌曲ID
        in: path
        name: id
        required: true
        type: integer
      - description: 歌曲信息
        in: body
        name: request
        required: true
        schema:
          properties:
            album:
              type: string
            artist:
              type: string
            cover_url:
              type: string
            is_live:
              type: boolean
            is_video:
              type: boolean
            title:
              type: string
            url:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/models.Song'
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 更新失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新歌曲信息
      tags:
      - 歌曲管理
  /songs/{id}/activate:
    post:
      description: 客户端切歌前调用，让后端 cancel 同一会话下其他歌曲的进行中工作（prefetch/transcode/reassign）。其他客户端会话不受影响。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 无内容
        "400":
          description: 无效的 song_id
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 标记当前活跃歌曲
      tags:
      - 歌曲管理
  /songs/{id}/audio-tracks:
    get:
      description: 用 ffprobe 探测该歌曲文件的音频流，返回每条流的 audio-relative index（对应 ffmpeg -map
        0:a:N）、title、language、codec、default。主要用于 Web 端双音轨（原唱/伴奏 mka）切换：前端据 tracks
        数量决定是否显示切轨入口，并用 index 调 /songs/{id}/play?track=N 抽轨播放。仅本地歌曲（或已落地缓存的网络歌曲）有文件可探测；无可探测文件或音频流
        < 2 条时也正常返回（前端据此不显示切轨）。运行时按需探测，不落库。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 音频流列表
          schema:
            $ref: '#/definitions/handlers.audioTracksResponse'
        "400":
          description: 无效的歌曲 ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取歌曲音频流列表
      tags:
      - 歌曲管理
  /songs/{id}/cover:
    get:
      description: 根据歌曲 ID 获取封面图片。优先使用本地封面文件（CoverPath），其次代理 CoverURL。CoverURL 支持以
        "/" 开头的相对路径，服务端自动经 InternalURLResolver 解析为内部 URL（含 access_token），用于插件歌曲封面代理。可选
        query 参数 w：把本地封面等比缩放到该宽度（物理像素，绝不放大、上限 1024）后以 JPEG 返回，用于 Web 端降低 GPU 纹理体积（songloft-org/songloft#309）；缺省或非法时返回原图。缩略仅作用于本地封面，远程代理封面忽略
        w。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 本地封面缩略目标宽度（物理像素，绝不放大，上限 1024）
        in: query
        name: w
        type: integer
      produces:
      - image/jpeg
      responses:
        "200":
          description: 封面图片
          schema:
            type: file
        "400":
          description: 无效的歌曲 ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲或封面不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 服务器错误
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 获取歌曲封面图片
      tags:
      - 歌曲管理
  /songs/{id}/hls/playlist:
    get:
      description: HLS 反代开启时，由 ServeProxy 改写后的 m3u8 内回链触发。拉取上游 m3u8 → 同源校验 → 改写 URI
        → 回写给 player。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 上游 m3u8 URL（base64url 编码）
        in: query
        name: u
        required: true
        type: string
      produces:
      - application/vnd.apple.mpegurl
      responses:
        "200":
          description: 改写后的 m3u8 文本
          schema:
            type: string
        "400":
          description: song_id 或 u 参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 非同源 URL 拒绝代理（SSRF 防护）
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 上游不可用
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 反代 HLS 子层 m3u8
      tags:
      - 电台与 HLS
  /songs/{id}/hls/segment:
    get:
      description: 由 HandlePlaylist 改写后的相对路径触发，反代音频切片、加密 key、init 段等二进制资源。透传 Range
        请求。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 上游切片 URL（base64url 编码）
        in: query
        name: u
        required: true
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 切片二进制内容
          schema:
            type: file
        "206":
          description: Range 请求的部分内容
          schema:
            type: file
        "400":
          description: song_id 或 u 参数无效
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 非同源 URL 拒绝代理
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 上游不可用
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 反代 HLS 切片 / key / init 段
      tags:
      - 电台与 HLS
  /songs/{id}/lyric:
    get:
      description: 根据 song.ID 返回 LyricPayload JSON，含 lyric/tlyric/rlyric/lxlyric。传
        refresh=1 时强制重新抓取：跳过库中自动获取的旧歌词(空/scraped/cached)重跑歌词搜索插件，响应挂 no-store 不缓存；file/embedded/manual
        等权威歌词不被覆盖。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 为 true 时绕过缓存强制重新抓取歌词（重跑歌词搜索插件，不覆盖 file/embedded/manual 歌词）
        in: query
        name: refresh
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: LyricPayload
          schema:
            additionalProperties: true
            type: object
        "404":
          description: 歌曲或歌词不存在
          schema:
            type: string
        "502":
          description: 歌词获取失败
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 获取歌曲歌词
      tags:
      - 歌曲管理
  /songs/{id}/lyrics:
    put:
      consumes:
      - application/json
      description: 更新指定歌曲的歌词内容和来源。url 来源传 lyric_remote_url,其它来源传 lyric/tlyric/rlyric/lxlyric
        四字段。响应里的 file_write_status 表示是否把元数据回写到本地音频文件:written=已写入,unchanged=未变更(非本地歌曲/无文件路径/不支持的扩展名/url
        来源),skipped=标签已一致无需写入,failed=尝试写入但失败(DB 已成功)。lyric_source=manual 用于标记用户手动调整,scanner
        重扫时不会覆盖
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 歌词信息
        in: body
        name: request
        required: true
        schema:
          properties:
            lxlyric:
              type: string
            lyric:
              type: string
            lyric_remote_url:
              type: string
            lyric_source:
              type: string
            rlyric:
              type: string
            tlyric:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            properties:
              file_write_status:
                type: string
              message:
                type: string
            type: object
        "400":
          description: 请求数据错误
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 歌曲不存在
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 更新失败
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 更新歌曲歌词
      tags:
      - 歌曲管理
  /songs/{id}/play:
    get:
      description: 按 song.ID 流式返回音频。内部根据 song.type 分发到本地文件 / 缓存下载 / 直链下载 / 电台 302。
      parameters:
      - description: 歌曲 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 目标转码格式（如 mp3、ogg），用于平台兼容性转码
        in: query
        name: format
        type: string
      - description: 目标音质码率（128/192/320），不传或不合法值表示原始音质。指定后默认转码为 mp3（除非同时指定了 format）
        in: query
        name: quality
        type: string
      - description: 抽取指定音频流播放（audio-relative 0-based，对应 ffmpeg -map 0:a:N）。用于 Web
          端双音轨（原唱/伴奏 mka）切轨：后端抽出单条音轨，AAC 编码时无损 remux 成 m4a、否则转 mp3。缺省/负数=不抽轨；与 media=video
          互斥
        in: query
        name: track
        type: integer
      - description: 传 1 时异步预热缓存/转码，立即返回 202
        in: query
        name: prefetch
        type: string
      - description: 传 video 时按视频播放：直出原容器（忽略 format/quality 转码，避免 -vn 丢画面），并按容器真实类型返回
          Content-Type（如 video/mp4）。用于应用内视频画面渲染与 DLNA 视频投屏
        in: query
        name: media
        type: string
      - description: 仅电台(HLS)有效。传 direct 时强制 302 直连源站、绕过本机 HLS 反代（即使 /settings/hls-proxy
          已开）。原生 player 无 CORS 限制，直连可避免直播切片经反代往返后过期(404)；浏览器不传此参数以继续走反代解决 CORS
        in: query
        name: hls
        type: string
      - description: 仅电台有效。传目标格式（如 mp3）时，服务端用 ffmpeg 把电台流实时转码为该格式（HLS 与裸流均适用）。用于只支持
          MP3、无法解码 AAC/HE-AAC 或不支持 HLS 的音箱。缺 ffmpeg 或坏源时优雅降级为原样代理/302。与 format 分离：电台侧忽略
          format，只认此参数
        in: query
        name: radio_transcode
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 音频文件
          schema:
            type: file
        "202":
          description: 预拉取已触发
          schema:
            type: string
        "302":
          description: 电台流重定向
          schema:
            type: string
        "404":
          description: 歌曲不存在
          schema:
            type: string
        "502":
          description: 音源不可用
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 流式播放歌曲
      tags:
      - 歌曲管理
  /songs/{id}/play.m3u8:
    get:
      description: 按 song.ID 流式返回音频。内部根据 song.type 分发到本地文件 / 缓存下载 / 直链下载 / 电台 302。
